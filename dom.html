<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="demo">Hello, world!</p>
<button onclick="changeText()">Change Text</button>
<p id="styleMe">Style me!</p>
<button onclick="changeStyle()">Change Style</button>
<div id="container"></div>

<button onclick="addParagraph()">Add Paragraph</button>

<p id="removeMe">Remove this paragraph</p>
<button onclick="removePara()">Remove</button>

<script>
function changeText() {
    document.getElementById("demo").innerHTML = "Text changed!";
}
function changeStyle() {
    document.getElementById("styleMe").style.color = "red";
    document.getElementById("styleMe").style.fontSize = "24px";
}

function addParagraph() {
    let para = document.createElement("p");
    para.innerText = "This is a new paragraph!";
    document.getElementById("container").appendChild(para);
}



function removePara() {
    let element = document.getElementById("removeMe");
    element.remove();
}
</script>

</body>
</html>
