<!DOCTYPE html>
<html>
<head><title>Mouseover Event</title></head>
<body>
  <h2 onmouseover="showMessage()" id="hoverText">Hover over me!</h2>
  <p id="msg"></p>

  <script>
    function showMessage() {
      document.getElementById("msg").innerText = "You hovered over the text!";
    }
  </script>
</body>
</html>
